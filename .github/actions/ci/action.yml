name: Shared CI
description: Run the shared Go validation steps

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version: '1.26.0'
    - name: Run tests
      shell: bash
      run: go test ./...
    - name: Build binary
      shell: bash
      run: mkdir -p dist && go build -o dist/pr-size-labeler ./cmd/pr-size-labeler
